# =============================================================================
# OpenTelemetry Collector Configuration for Coleman – ClickHouse Mode
# =============================================================================
#
# This configuration extends the base config by adding ClickHouse exporters
# for metrics, traces, and logs.  Use this config when running with the
# ClickHouse profile:
#
#   OTEL_COLLECTOR_CONFIG=otel-collector-config-clickhouse.yaml \
#     docker compose --profile clickhouse up -d
#
# All base exporters (Prometheus, debug) remain active so live dashboards
# continue to work alongside persistent ClickHouse storage.
# =============================================================================

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

exporters:
  # Prometheus endpoint for Grafana scraping (same as base)
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: "coleman"

  # Debug/logging exporter (traces)
  debug:
    verbosity: basic

  # ClickHouse exporter for persistent storage
  clickhouse:
    endpoint: tcp://clickhouse:9000?dial_timeout=10s
    database: default
    traces_table_name: otel_traces
    metrics_table_name: otel_metrics
    logs_table_name: otel_logs
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, clickhouse]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug, clickhouse]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [clickhouse]
